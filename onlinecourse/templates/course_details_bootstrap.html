{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1H/6U5KkN5Q5K5t9K/6p5Q5p5p5p5p5p5p5p5p5p5p5"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">{{ course.name }}</h1>
    <p>{{ course.description }}</p>

    <h2 class="mt-5">Lessons</h2>
    <div class="list-group">
        {% for lesson in course.lessons.all %}
            <a href="{% url 'lesson_detail' lesson.id %}"
               class="list-group-item list-group-item-action">
                <h5 class="mb-1">{{ lesson.title }}</h5>
                <p class="mb-1">{{ lesson.content|truncatewords:20 }}</p>
            </a>
        {% empty %}
            <p class="text-muted">No lessons available for this course.</p>
        {% endfor %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+6Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
        crossorigin="anonymous"></script>
</body>
</html>
